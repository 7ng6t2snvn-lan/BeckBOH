<p>This will add <strong>41 new recipes</strong> to the beck-kitchen-reference Firestore database.</p>

<div id="log"></div>

const firebaseConfig = {
  apiKey: "AIzaSyDtn_GIhclAhBWhYZoHCy5kpbgHnxpLq6I",

  projectId: "beck-kitchen-reference",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('authStatus').innerHTML = `<span class="ok">✓ Signed in as ${user.email}</span>`;
    document.getElementById('pushBtn').disabled = false;
    document.getElementById('signInBtn').style.display = 'none';
  } else {
    document.getElementById('authStatus').innerHTML = `<span class="err">Not signed in — click Sign In first</span>`;
    document.getElementById('pushBtn').disabled = true;
  }
});

window.signIn = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('log').innerHTML = `<span class="err">Sign in failed: ${e.message}</span>`;
  }
};

window.pushRecipes = async function() {
  const btn = document.getElementById('pushBtn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'PUSHING...';
  log.innerHTML = '<span class="info">Starting push of ' + NEW_RECIPES.length + ' recipes...\n\n</span>';

  let success = 0;
  let errors = 0;

  for (const recipe of NEW_RECIPES) {
    try {
      await setDoc(doc(db, 'recipes', recipe.id), recipe);
      log.innerHTML += `<span class="ok">✓ ${recipe.id} — ${recipe.name}</span>\n`;
      success++;
    } catch (e) {
      log.innerHTML += `<span class="err">✗ ${recipe.id} — ${recipe.name}: ${e.message}</span>\n`;
      errors++;
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 100));
  }

  log.innerHTML += `\n<span class="info">Done. ${success} pushed successfully. ${errors} errors.</span>`;
  btn.textContent = 'COMPLETE';
};
</script>
