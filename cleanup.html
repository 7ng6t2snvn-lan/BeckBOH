const log = document.getElementById('log');
function print(msg) { log.textContent += msg + '\n'; }

window.runCleanup = async function() {
  log.textContent = '';
  print('Signing in to Google...');
  try {
    await signInWithPopup(auth, provider);
    print('Signed in.\n');
  } catch(e) {
    print('Sign-in failed: ' + e.message);
    return;
  }


  const dedupIds = ['r57', 'r58', 'r59'];

  print('Fetching all recipes from Firestore...');
  const snap = await getDocs(collection(db, 'recipes'));
  const allDocs = [];
  snap.forEach(d => allDocs.push({ docId: d.id, data: d.data() }));
  print(`Found ${allDocs.length} total recipe documents.\n`);

  // Delete duplicates of r57/r58/r59 then rewrite all
  for (const targetId of dedupIds) {
    const matches = allDocs.filter(d => d.data.id === targetId);
    print(`Found ${matches.length} document(s) with id='${targetId}':`);
    for (const m of matches) {
      print(`  Deleting doc key: ${m.docId}`);
      await deleteDoc(doc(db, 'recipes', m.docId));
      print(`  ✓ Deleted.`);
    }
  }

  print('\nWriting all recipes (r57–r63)...');
  for (const recipe of CORRECT_RECIPES) {
    await setDoc(doc(db, 'recipes', recipe.id), recipe);
    print(`✓ Wrote: ${recipe.name}`);
  }

  print('\n✅ Done! Refresh the Beck Kitchen app.');
};
</script>
